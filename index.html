<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFSP Records</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #f5f2ed;
      --text-dim: #8a8a8a;
      --accent: #e63946;
      --green: #2ecc71;
      --yellow: #f39c12;
      --blue: #3498db;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    /* Lock Screen */
    #lockScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 1.5rem;
    }
    #lockScreen.hidden { display: none; }
    #lockScreen img { width: 60px; height: 60px; }
    #lockScreen input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1.2rem;
      color: var(--text);
      font-size: 1rem;
      width: 250px;
      text-align: center;
    }
    #lockScreen input:focus { outline: none; border-color: var(--accent); }
    #lockScreen .lock-error { color: var(--accent); font-size: 0.8rem; display: none; }
    
    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; }
    .logo img { height: 28px; width: 28px; }
    .header-actions { display: flex; gap: 0.5rem; }
    
    /* Navigation */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
    }
    nav button {
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 1rem 1.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    nav button.active { color: var(--text); border-bottom-color: var(--accent); }
    nav button:hover { color: var(--text); }
    
    /* Main */
    main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    
    /* Stats Cards */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
    }
    .stat-card .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 0.4rem; }
    .stat-card .value.green { color: var(--green); }
    .stat-card .value.yellow { color: var(--yellow); }
    .stat-card .value.blue { color: var(--blue); }
    .stat-card .value.red { color: var(--accent); }
    
    /* Chart */
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .chart-header h3 { font-size: 0.9rem; color: var(--text-dim); }
    .chart-tabs { display: flex; gap: 0.3rem; }
    .chart-tabs button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .chart-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
    .chart-canvas { position: relative; height: 180px; width: 100%; }
    .chart-canvas svg { width: 100%; height: 100%; }
    .chart-legend { display: flex; gap: 1rem; margin-top: 0.8rem; font-size: 0.7rem; color: var(--text-dim); }
    .chart-legend span { display: flex; align-items: center; gap: 0.3rem; }
    .chart-legend .dot { width: 8px; height: 8px; border-radius: 50%; }
    
    /* Section */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .section-header h2 { font-size: 1.2rem; font-weight: 600; }
    
    /* Buttons */
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-outline:hover { border-color: var(--text-dim); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; touch-action: manipulation; }
    .stock-btn { padding: 0.4rem 0.7rem; font-size: 1rem; min-width: 32px; min-height: 32px; touch-action: manipulation; cursor: pointer; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; }
    .btn-green { background: var(--green); }
    .btn-yellow { background: var(--yellow); color: #000; }
    .btn-blue { background: var(--blue); }
    .btn-danger { background: #c0392b; }
    
    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 0.8rem 1rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: var(--surface2); }
    
    /* Status badges */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-pending { background: rgba(243,156,18,0.15); color: var(--yellow); }
    .badge-confirmed { background: rgba(52,152,219,0.15); color: var(--blue); }
    .badge-shipped { background: rgba(155,89,182,0.15); color: #9b59b6; }
    .badge-delivered { background: rgba(46,204,113,0.15); color: var(--green); }
    .badge-cancelled { background: rgba(192,57,43,0.15); color: #e74c3c; }
    
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { margin-bottom: 1.5rem; font-size: 1.1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.4rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem;
      color: var(--text);
      font-size: 0.9rem;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem; }
    
    /* Empty state */
    .empty { text-align: center; padding: 3rem; color: var(--text-dim); }
    .empty p { margin-top: 0.5rem; font-size: 0.9rem; }
    
    /* Tab content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Filter row */
    .filter-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-row select, .filter-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.8rem;
      color: var(--text);
      font-size: 0.8rem;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      header { padding: 0.8rem 1rem; }
      main { padding: 1rem; }
      .stats { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
      .stat-card { padding: 1rem; }
      .stat-card .value { font-size: 1.4rem; }
      .form-row { grid-template-columns: 1fr; }
      nav { padding: 0 0.5rem; }
      nav button { padding: 0.8rem 1rem; font-size: 0.8rem; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 500px; }
      .chart-bars { height: 120px; }
      .section-header { flex-wrap: wrap; gap: 0.5rem; }
    }
    @media (max-width: 400px) {
      .stats { grid-template-columns: 1fr; }
      nav button { padding: 0.7rem 0.7rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <img src="star-logo.png" alt="TFSP">
    <input type="password" id="lockPassword" placeholder="Enter password" onkeydown="if(event.key==='Enter')unlock()">
    <button class="btn" onclick="unlock()">Unlock</button>
    <p class="lock-error" id="lockError">Wrong password</p>
  </div>

  <header>
    <div class="logo"><img src="star-logo.png" alt="TFSP"></div>
    <div class="header-actions">
      <span id="syncStatus" style="font-size:0.75rem;margin-right:0.5rem">☁</span>
      <button class="btn-outline" onclick="cloudLoad()">Sync</button>
      <button class="btn-outline" onclick="exportData()">Export</button>
      <button class="btn-outline" onclick="document.getElementById('importFile').click()">Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn-outline" onclick="lockApp()">Lock</button>
    </div>
  </header>
  
  <nav>
    <button class="active" onclick="switchTab('dashboard')">Dashboard</button>
    <button onclick="switchTab('orders')">Orders</button>
    <button onclick="switchTab('inventory')">Inventory</button>
    <button onclick="switchTab('expenses')">Expenses</button>
    <button onclick="switchTab('customers')">Customers</button>
  </nav>
  
  <main>
    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="tab-content active">
      <div class="stats" id="dashStats"></div>
      <div class="chart-container">
        <div class="chart-header">
          <h3>Revenue & Expenses</h3>
          <div class="chart-tabs">
            <button class="active" onclick="setChartPeriod('week')">Week</button>
            <button onclick="setChartPeriod('month')">Month</button>
            <button onclick="setChartPeriod('year')">Year</button>
          </div>
        </div>
        <div class="chart-canvas" id="lineChart"></div>
        <div class="chart-legend">
          <span><div class="dot" style="background:var(--green)"></div> Revenue</span>
          <span><div class="dot" style="background:var(--accent)"></div> Expenses</span>
        </div>
      </div>
      <div class="section-header"><h2>Recent Orders</h2></div>
      <div class="table-wrap" id="recentOrders"></div>
    </div>
    
    <!-- ORDERS -->
    <div id="tab-orders" class="tab-content">
      <div class="section-header">
        <h2>All Orders</h2>
        <button class="btn" onclick="openModal('order')">+ New Order</button>
      </div>
      <div class="filter-row">
        <select id="orderStatusFilter" onchange="renderOrders()">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <input type="text" id="orderSearch" placeholder="Search name/phone..." oninput="renderOrders()">
      </div>
      <div class="table-wrap" id="ordersTable"></div>
    </div>
    
    <!-- INVENTORY -->
    <div id="tab-inventory" class="tab-content">
      <div class="stats" id="invStats"></div>
      <div class="section-header">
        <h2>Inventory</h2>
        <button class="btn" onclick="openModal('inventory')">+ Add Item</button>
      </div>
      <div class="filter-row">
        <select id="invCategoryFilter" onchange="renderInventory()">
          <option value="all">All Categories</option>
          <option value="tees">Tees</option>
          <option value="stickers">Stickers</option>
          <option value="posters">Posters</option>
        </select>
        <select id="invStockFilter" onchange="renderInventory()">
          <option value="all">All Stock</option>
          <option value="low">Low Stock (≤5)</option>
          <option value="out">Out of Stock</option>
        </select>
      </div>
      <div class="table-wrap" id="inventoryTable"></div>
    </div>
    
    <!-- EXPENSES -->
    <div id="tab-expenses" class="tab-content">
      <div class="section-header">
        <h2>Expenses</h2>
        <button class="btn" onclick="openModal('expense')">+ Add Expense</button>
      </div>
      <div class="filter-row">
        <select id="expenseMonthFilter" onchange="renderExpenses()">
          <option value="all">All Months</option>
        </select>
      </div>
      <div class="stats" id="expenseStats"></div>
      <div class="table-wrap" id="expensesTable"></div>
    </div>
    
    <!-- CUSTOMERS -->
    <div id="tab-customers" class="tab-content">
      <div class="section-header"><h2>Customers</h2></div>
      <div class="table-wrap" id="customersTable"></div>
    </div>
  </main>
  
  <!-- ORDER MODAL -->
  <div class="modal-overlay" id="modal-order">
    <div class="modal">
      <h3 id="orderModalTitle">New Order</h3>
      <input type="hidden" id="ord-edit-id">
      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" id="ord-name">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="ord-phone" placeholder="+977...">
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="ord-location">
        </div>
      </div>
      <div class="form-group">
        <label>Items (e.g. "2x The Crow Tee - White - L")</label>
        <textarea id="ord-items" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Amount (NPR)</label>
          <input type="number" id="ord-amount">
        </div>
        <div class="form-group">
          <label>Shipping (NPR)</label>
          <input type="number" id="ord-shipping" value="100">
        </div>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="ord-status">
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <input type="text" id="ord-notes">
      </div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeModal('order')">Cancel</button>
        <button class="btn" onclick="saveOrder()">Save Order</button>
      </div>
    </div>
  </div>
  
  <!-- INVENTORY MODAL -->
  <div class="modal-overlay" id="modal-inventory">
    <div class="modal">
      <h3 id="invModalTitle">Add Inventory Item</h3>
      <input type="hidden" id="inv-edit-id">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="inv-name">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="inv-category">
            <option value="tees">Tees</option>
            <option value="stickers">Stickers</option>
            <option value="posters">Posters</option>
          </select>
        </div>
        <div class="form-group">
          <label>Variant (size/color)</label>
          <input type="text" id="inv-variant" placeholder="e.g. White - L">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Stock Qty</label>
          <input type="number" id="inv-stock">
        </div>
        <div class="form-group">
          <label>Cost Price (NPR)</label>
          <input type="number" id="inv-cost">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeModal('inventory')">Cancel</button>
        <button class="btn" onclick="saveInventory()">Save</button>
      </div>
    </div>
  </div>
  
  <!-- EXPENSE MODAL -->
  <div class="modal-overlay" id="modal-expense">
    <div class="modal">
      <h3 id="expModalTitle">Add Expense</h3>
      <input type="hidden" id="exp-edit-id">
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="exp-desc" placeholder="e.g. T-shirt printing batch">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="exp-category">
            <option value="printing">Printing</option>
            <option value="shipping">Shipping</option>
            <option value="materials">Materials</option>
            <option value="packaging">Packaging</option>
            <option value="marketing">Marketing</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount (NPR)</label>
          <input type="number" id="exp-amount">
        </div>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="exp-date">
      </div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeModal('expense')">Cancel</button>
        <button class="btn" onclick="saveExpense()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // PASSWORD (change this to your password)
    const APP_PASSWORD = 'tfsp2025';
    const SESSION_KEY = 'tfsp_unlocked';
    
    function unlock() {
      const input = document.getElementById('lockPassword').value;
      if (input === APP_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, 'true');
        document.getElementById('lockScreen').classList.add('hidden');
      } else {
        document.getElementById('lockError').style.display = 'block';
        document.getElementById('lockPassword').value = '';
      }
    }
    
    function lockApp() {
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById('lockScreen').classList.remove('hidden');
      document.getElementById('lockPassword').value = '';
      document.getElementById('lockError').style.display = 'none';
    }
    
    // Check lock on load
    if (sessionStorage.getItem(SESSION_KEY) === 'true') {
      document.getElementById('lockScreen').classList.add('hidden');
    }

    // DATA STORE
    const DB_KEY = 'tfsp_records';
    
    function getDB() {
      const raw = localStorage.getItem(DB_KEY);
      if (raw) return JSON.parse(raw);
      return { orders: [], inventory: [], expenses: [] };
    }
    
    function saveDBLocal(db) {
      localStorage.setItem(DB_KEY, JSON.stringify(db));
    }
    
    function saveDB(db) {
      localStorage.setItem(DB_KEY, JSON.stringify(db));
      showSaveIndicator();
      clearTimeout(window._syncTimer);
      window._syncTimer = setTimeout(cloudSave, 2000);
    }
    
    function showSaveIndicator() {
      let el = document.getElementById('saveIndicator');
      if (!el) {
        el = document.createElement('div');
        el.id = 'saveIndicator';
        el.style.cssText = 'position:fixed;bottom:1rem;right:1rem;background:var(--green);color:#000;padding:0.5rem 1rem;border-radius:8px;font-size:0.8rem;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s';
        document.body.appendChild(el);
      }
      el.textContent = '✓ Saved';
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 1500);
    }

    // JSONBIN CLOUD SYNC
    const JSONBIN_KEY = '$2a$10$xZN483APLgMadivEojc0/.GVEHtySeohRxj49LMcVg49Yyh1BsoQa';
    const BIN_ID_KEY = 'tfsp_bin_id';
    const HARDCODED_BIN_ID = '6a044bb6c0954111d8187395';
    
    async function findOrCreateBin() {
      // Always use the known bin
      localStorage.setItem(BIN_ID_KEY, HARDCODED_BIN_ID);
      return HARDCODED_BIN_ID;
    }
    
    async function cloudSave() {
      const db = getDB();
      showSyncStatus('saving');
      try {
        const binId = await findOrCreateBin();
        if (!binId) throw new Error('No bin');
        const res = await fetch('https://api.jsonbin.io/v3/b/' + binId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
          body: JSON.stringify(db)
        });
        if (!res.ok) throw new Error('PUT failed');
        showSyncStatus('synced');
      } catch(e) {
        console.error('Cloud save error:', e);
        showSyncStatus('error');
      }
    }
    
    async function cloudLoad() {
      showSyncStatus('saving');
      try {
        const binId = await findOrCreateBin();
        if (!binId) { showSyncStatus('no-data'); return; }
        const res = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        const data = await res.json();
        if (data.record && data.record.orders) {
          saveDBLocal(data.record);
          render();
          showSyncStatus('synced');
        } else {
          showSyncStatus('no-data');
        }
      } catch(e) {
        console.error('Cloud load error:', e);
        showSyncStatus('error');
      }
    }
    
    function showSyncStatus(status) {
      const el = document.getElementById('syncStatus');
      if (!el) return;
      if (status === 'synced') { el.textContent = '☁ Synced'; el.style.color = 'var(--green)'; }
      else if (status === 'error') { el.textContent = '☁ Offline'; el.style.color = 'var(--yellow)'; }
      else if (status === 'saving') { el.textContent = '☁ Saving...'; el.style.color = 'var(--text-dim)'; }
      else { el.textContent = '☁ New'; el.style.color = 'var(--text-dim)'; }
    }
    
    // TABS
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
      render();
    }
    
    // MODALS
    function openModal(type) {
      document.getElementById('modal-' + type).classList.add('active');
      if (type === 'expense' && !document.getElementById('exp-edit-id').value) {
        document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
      }
    }
    function closeModal(type) {
      document.getElementById('modal-' + type).classList.remove('active');
      // Reset edit state
      if (type === 'order') {
        document.getElementById('ord-edit-id').value = '';
        document.getElementById('orderModalTitle').textContent = 'New Order';
        clearForm('ord', ['name','phone','location','items','amount','notes']);
        document.getElementById('ord-shipping').value = '100';
        document.getElementById('ord-status').value = 'pending';
      }
      if (type === 'inventory') {
        document.getElementById('inv-edit-id').value = '';
        document.getElementById('invModalTitle').textContent = 'Add Inventory Item';
        clearForm('inv', ['name','variant','stock','cost']);
      }
      if (type === 'expense') {
        document.getElementById('exp-edit-id').value = '';
        document.getElementById('expModalTitle').textContent = 'Add Expense';
        clearForm('exp', ['desc','amount','date']);
      }
    }
    
    // FORMAT
    function formatNpr(n) { return 'Rs ' + Number(n).toLocaleString('en-IN'); }
    function formatDate(d) { 
      const date = new Date(d);
      return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    
    // EDIT ORDER
    function editOrder(id) {
      const db = getDB();
      const o = db.orders.find(x => x.id === id);
      if (!o) return;
      document.getElementById('ord-edit-id').value = o.id;
      document.getElementById('orderModalTitle').textContent = 'Edit Order';
      document.getElementById('ord-name').value = o.name;
      document.getElementById('ord-phone').value = o.phone;
      document.getElementById('ord-location').value = o.location;
      document.getElementById('ord-items').value = o.items;
      document.getElementById('ord-amount').value = o.amount;
      document.getElementById('ord-shipping').value = o.shipping || 100;
      document.getElementById('ord-status').value = o.status;
      document.getElementById('ord-notes').value = o.notes || '';
      openModal('order');
    }
    
    // SAVE ORDER
    function saveOrder() {
      const db = getDB();
      const editId = document.getElementById('ord-edit-id').value;
      const orderData = {
        name: document.getElementById('ord-name').value,
        phone: document.getElementById('ord-phone').value,
        location: document.getElementById('ord-location').value,
        items: document.getElementById('ord-items').value,
        amount: Number(document.getElementById('ord-amount').value),
        shipping: Number(document.getElementById('ord-shipping').value),
        status: document.getElementById('ord-status').value,
        notes: document.getElementById('ord-notes').value,
      };
      if (!orderData.name || !orderData.amount) return alert('Name and amount required');
      
      if (editId) {
        const idx = db.orders.findIndex(o => o.id === editId);
        if (idx !== -1) { db.orders[idx] = { ...db.orders[idx], ...orderData }; }
      } else {
        const order = {
          id: 'ORD-' + String(db.orders.length + 1).padStart(3, '0'),
          ...orderData,
          date: new Date().toISOString(),
        };
        db.orders.unshift(order);
      }
      saveDB(db);
      closeModal('order');
      render();
    }
    
    // EDIT INVENTORY
    function editInventory(id) {
      const db = getDB();
      const item = db.inventory.find(x => x.id === id);
      if (!item) return;
      document.getElementById('inv-edit-id').value = item.id;
      document.getElementById('invModalTitle').textContent = 'Edit Item';
      document.getElementById('inv-name').value = item.name;
      document.getElementById('inv-category').value = item.category;
      document.getElementById('inv-variant').value = item.variant;
      document.getElementById('inv-stock').value = item.stock;
      document.getElementById('inv-cost').value = item.cost;
      openModal('inventory');
    }
    
    // SAVE INVENTORY
    function saveInventory() {
      const db = getDB();
      const editId = document.getElementById('inv-edit-id').value;
      const itemData = {
        name: document.getElementById('inv-name').value,
        category: document.getElementById('inv-category').value,
        variant: document.getElementById('inv-variant').value,
        stock: Number(document.getElementById('inv-stock').value),
        cost: Number(document.getElementById('inv-cost').value),
      };
      if (!itemData.name) return alert('Product name required');
      
      if (editId) {
        const idx = db.inventory.findIndex(i => i.id === editId);
        if (idx !== -1) { db.inventory[idx] = { ...db.inventory[idx], ...itemData }; }
      } else {
        db.inventory.push({ id: 'INV-' + Date.now(), ...itemData });
      }
      saveDB(db);
      closeModal('inventory');
      render();
    }
    
    // EDIT EXPENSE
    function editExpense(id) {
      const db = getDB();
      const exp = db.expenses.find(x => x.id === id);
      if (!exp) return;
      document.getElementById('exp-edit-id').value = exp.id;
      document.getElementById('expModalTitle').textContent = 'Edit Expense';
      document.getElementById('exp-desc').value = exp.desc;
      document.getElementById('exp-category').value = exp.category;
      document.getElementById('exp-amount').value = exp.amount;
      document.getElementById('exp-date').value = exp.date;
      openModal('expense');
    }
    
    // SAVE EXPENSE
    function saveExpense() {
      const db = getDB();
      const editId = document.getElementById('exp-edit-id').value;
      const expData = {
        desc: document.getElementById('exp-desc').value,
        category: document.getElementById('exp-category').value,
        amount: Number(document.getElementById('exp-amount').value),
        date: document.getElementById('exp-date').value,
      };
      if (!expData.desc || !expData.amount) return alert('Description and amount required');
      
      if (editId) {
        const idx = db.expenses.findIndex(e => e.id === editId);
        if (idx !== -1) { db.expenses[idx] = { ...db.expenses[idx], ...expData }; }
      } else {
        db.expenses.push({ id: 'EXP-' + Date.now(), ...expData });
      }
      saveDB(db);
      closeModal('expense');
      render();
    }
    
    function clearForm(prefix, fields) {
      fields.forEach(f => {
        const el = document.getElementById(prefix + '-' + f);
        if (el) el.value = '';
      });
    }
    
    // UPDATE ORDER STATUS
    function updateOrderStatus(id, status) {
      const db = getDB();
      const order = db.orders.find(o => o.id === id);
      if (order) { order.status = status; saveDB(db); render(); }
    }
    
    // RENDER
    function render() {
      renderDashboard();
      renderOrders();
      renderInventory();
      renderExpenses();
      renderCustomers();
    }
    
    function renderDashboard() {
      const db = getDB();
      const totalRevenue = db.orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + o.amount + (o.shipping || 0), 0);
      const totalExpenses = db.expenses.reduce((s, e) => s + e.amount, 0);
      const pendingOrders = db.orders.filter(o => o.status === 'pending').length;
      const totalOrders = db.orders.length;
      const profit = totalRevenue - totalExpenses;
      
      document.getElementById('dashStats').innerHTML = `
        <div class="stat-card"><div class="label">Total Revenue</div><div class="value green">${formatNpr(totalRevenue)}</div></div>
        <div class="stat-card"><div class="label">Total Expenses</div><div class="value red">${formatNpr(totalExpenses)}</div></div>
        <div class="stat-card"><div class="label">Pending Orders</div><div class="value yellow">${pendingOrders}</div></div>
        <div class="stat-card"><div class="label">Total Orders</div><div class="value">${totalOrders}</div></div>
      `;
      
      // Line Chart
      renderLineChart('week');
      
      const recent = db.orders.slice(0, 5);
      if (recent.length === 0) {
        document.getElementById('recentOrders').innerHTML = '<div class="empty"><p>No orders yet. Add your first order!</p></div>';
        return;
      }
      document.getElementById('recentOrders').innerHTML = `<table>
        <tr><th>ID</th><th>Customer</th><th>Items</th><th>Amount</th><th>Status</th><th>Date</th></tr>
        ${recent.map(o => `<tr>
          <td>${o.id}</td><td>${o.name}</td><td>${o.items.substring(0, 30)}${o.items.length > 30 ? '...' : ''}</td>
          <td>${formatNpr(o.amount)}</td><td><span class="badge badge-${o.status}">${o.status}</span></td>
          <td>${formatDate(o.date)}</td></tr>`).join('')}
      </table>`;
    }
    
    let currentChartPeriod = 'week';
    
    function setChartPeriod(period) {
      currentChartPeriod = period;
      document.querySelectorAll('.chart-tabs button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderLineChart(period);
    }
    
    function renderLineChart(period) {
      const db = getDB();
      const now = new Date();
      let points = [];
      
      if (period === 'week') {
        for (let i = 6; i >= 0; i--) {
          const d = new Date(now); d.setDate(d.getDate() - i);
          const key = d.toISOString().split('T')[0];
          const label = d.toLocaleDateString('en', { weekday: 'short' });
          const rev = db.orders.filter(o => o.status !== 'cancelled' && o.date && o.date.startsWith(key)).reduce((s, o) => s + o.amount + (o.shipping || 0), 0);
          const exp = db.expenses.filter(e => e.date === key).reduce((s, e) => s + e.amount, 0);
          points.push({ label, rev, exp, profit: rev - exp });
        }
      } else if (period === 'month') {
        for (let i = 29; i >= 0; i -= 5) {
          const d = new Date(now); d.setDate(d.getDate() - i);
          const endD = new Date(d); endD.setDate(endD.getDate() + 5);
          const label = d.toLocaleDateString('en', { day: '2-digit', month: 'short' });
          let rev = 0, exp = 0;
          for (let j = 0; j < 5; j++) {
            const dd = new Date(d); dd.setDate(dd.getDate() + j);
            const key = dd.toISOString().split('T')[0];
            rev += db.orders.filter(o => o.status !== 'cancelled' && o.date && o.date.startsWith(key)).reduce((s, o) => s + o.amount + (o.shipping || 0), 0);
            exp += db.expenses.filter(e => e.date === key).reduce((s, e) => s + e.amount, 0);
          }
          points.push({ label, rev, exp, profit: rev - exp });
        }
      } else {
        for (let i = 11; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const label = d.toLocaleDateString('en', { month: 'short' });
          const m = d.getMonth(), y = d.getFullYear();
          const rev = db.orders.filter(o => o.status !== 'cancelled' && o.date && new Date(o.date).getMonth() === m && new Date(o.date).getFullYear() === y).reduce((s, o) => s + o.amount + (o.shipping || 0), 0);
          const exp = db.expenses.filter(e => e.date && new Date(e.date).getMonth() === m && new Date(e.date).getFullYear() === y).reduce((s, e) => s + e.amount, 0);
          points.push({ label, rev, exp, profit: rev - exp });
        }
      }
      
      const maxVal = Math.max(...points.map(p => Math.max(p.rev, p.exp, Math.abs(p.profit))), 100);
      const w = 100, h = 100;
      const padL = 0, padR = 0, padT = 5, padB = 15;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;
      
      function toX(i) { return padL + (i / (points.length - 1)) * chartW; }
      function toY(val) { return padT + chartH - (val / maxVal) * chartH; }
      
      function makePath(key, color) {
        const pts = points.map((p, i) => `${toX(i)},${toY(Math.max(0, p[key]))}`);
        return `<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                ${points.map((p, i) => `<circle cx="${toX(i)}" cy="${toY(Math.max(0, p[key]))}" r="2" fill="${color}"/>`).join('')}`;
      }
      
      // Grid lines
      let grid = '';
      for (let i = 0; i <= 4; i++) {
        const y = padT + (i / 4) * chartH;
        grid += `<line x1="${padL}" y1="${y}" x2="${w}" y2="${y}" stroke="#2a2a2a" stroke-width="0.3"/>`;
      }
      
      // X labels
      let labels = points.map((p, i) => `<text x="${toX(i)}" y="${h - 2}" text-anchor="middle" font-size="3" fill="#8a8a8a">${p.label}</text>`).join('');
      
      const svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        ${grid}
        ${makePath('rev', '#2ecc71')}
        ${makePath('exp', '#e63946')}
        ${labels}
      </svg>`;
      
      document.getElementById('lineChart').innerHTML = svg;
    }
    
    function renderOrders() {
      const db = getDB();
      const statusFilter = document.getElementById('orderStatusFilter')?.value || 'all';
      const search = (document.getElementById('orderSearch')?.value || '').toLowerCase();
      
      let orders = db.orders;
      if (statusFilter !== 'all') orders = orders.filter(o => o.status === statusFilter);
      if (search) orders = orders.filter(o => o.name.toLowerCase().includes(search) || o.phone.includes(search));
      
      if (orders.length === 0) {
        document.getElementById('ordersTable').innerHTML = '<div class="empty"><p>No orders found</p></div>';
        return;
      }
      
      document.getElementById('ordersTable').innerHTML = `<table>
        <tr><th>ID</th><th>Customer</th><th>Phone</th><th>Location</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
        ${orders.map(o => `<tr>
          <td>${o.id}</td><td>${o.name}</td><td>${o.phone}</td><td>${o.location}</td>
          <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${o.items}">${o.items}</td>
          <td>${formatNpr(o.amount + (o.shipping || 0))}</td>
          <td>
            <select onchange="updateOrderStatus('${o.id}', this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.3rem;border-radius:4px;font-size:0.75rem">
              ${['pending','confirmed','shipped','delivered','cancelled'].map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </td>
          <td>${formatDate(o.date)}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-blue btn-sm" onclick="editOrder('${o.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteOrder('${o.id}')">×</button>
          </td>
        </tr>`).join('')}
      </table>`;
    }
    
    // ADJUST STOCK
    function adjustStock(id, delta) {
      const db = getDB();
      const item = db.inventory.find(i => i.id === id);
      if (item) {
        item.stock = Math.max(0, item.stock + delta);
        saveDB(db);
        renderInventory();
      }
    }
    
    // DELETE with safe ID handling
    function deleteOrder(id) {
      if (!confirm('Delete this order?')) return;
      const db = getDB();
      db.orders = db.orders.filter(o => o.id !== id);
      saveDB(db);
      render();
    }
    function deleteInventory(id) {
      if (!confirm('Delete this item?')) return;
      const db = getDB();
      db.inventory = db.inventory.filter(i => i.id !== id);
      saveDB(db);
      render();
    }
    function deleteExpense(id) {
      if (!confirm('Delete this expense?')) return;
      const db = getDB();
      db.expenses = db.expenses.filter(e => e.id !== id);
      saveDB(db);
      render();
    }
    
    function renderInventory() {
      const db = getDB();
      const catFilter = document.getElementById('invCategoryFilter')?.value || 'all';
      const stockFilter = document.getElementById('invStockFilter')?.value || 'all';
      
      // Stats
      const totalItems = db.inventory.length;
      const totalStock = db.inventory.reduce((s, i) => s + i.stock, 0);
      const totalValue = db.inventory.reduce((s, i) => s + (i.stock * i.cost), 0);
      const lowStock = db.inventory.filter(i => i.stock > 0 && i.stock <= 5).length;
      const outOfStock = db.inventory.filter(i => i.stock === 0).length;
      
      document.getElementById('invStats').innerHTML = `
        <div class="stat-card"><div class="label">Total Items</div><div class="value">${totalItems}</div></div>
        <div class="stat-card"><div class="label">Total Units</div><div class="value blue">${totalStock}</div></div>
        <div class="stat-card"><div class="label">Stock Value</div><div class="value green">${formatNpr(totalValue)}</div></div>
        <div class="stat-card"><div class="label">Low Stock</div><div class="value yellow">${lowStock}</div></div>
        <div class="stat-card"><div class="label">Out of Stock</div><div class="value red">${outOfStock}</div></div>
      `;
      
      let items = db.inventory;
      if (catFilter !== 'all') items = items.filter(i => i.category === catFilter);
      if (stockFilter === 'low') items = items.filter(i => i.stock > 0 && i.stock <= 5);
      if (stockFilter === 'out') items = items.filter(i => i.stock === 0);
      
      if (items.length === 0) {
        document.getElementById('inventoryTable').innerHTML = '<div class="empty"><p>No inventory items found</p></div>';
        return;
      }
      document.getElementById('inventoryTable').innerHTML = `<table>
        <tr><th>Product</th><th>Category</th><th>Variant</th><th>Stock</th><th>Cost/Unit</th><th>Value</th><th>Actions</th></tr>
        ${items.map((i, idx) => {
          const stockClass = i.stock === 0 ? 'color:var(--accent)' : i.stock <= 5 ? 'color:var(--yellow)' : 'color:var(--green)';
          const stockLabel = i.stock === 0 ? ' (OUT)' : i.stock <= 5 ? ' (LOW)' : '';
          const safeId = i.id.replace(/'/g, "\\'");
          return `<tr>
          <td><strong>${i.name}</strong></td><td>${i.category}</td><td>${i.variant}</td>
          <td style="${stockClass};font-weight:600;white-space:nowrap">
            <button class="stock-btn" onclick="adjustStock('${safeId}', -1)">−</button>
            <span style="display:inline-block;min-width:30px;text-align:center;margin:0 0.3rem">${i.stock}</span>
            <button class="stock-btn" onclick="adjustStock('${safeId}', 1)">+</button>
            ${stockLabel ? '<br><small style="font-size:0.65rem">'+stockLabel.trim()+'</small>' : ''}
          </td>
          <td>${formatNpr(i.cost)}</td>
          <td>${formatNpr(i.stock * i.cost)}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-blue btn-sm" onclick="editInventory('${safeId}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteInventory('${safeId}')">×</button>
          </td>
        </tr>`}).join('')}
      </table>`;
    }
    
    function renderExpenses() {
      const db = getDB();
      const totalExp = db.expenses.reduce((s, e) => s + e.amount, 0);
      document.getElementById('expenseStats').innerHTML = `
        <div class="stat-card"><div class="label">Total Expenses</div><div class="value red">${formatNpr(totalExp)}</div></div>
      `;
      if (db.expenses.length === 0) {
        document.getElementById('expensesTable').innerHTML = '<div class="empty"><p>No expenses recorded</p></div>';
        return;
      }
      const sorted = [...db.expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
      document.getElementById('expensesTable').innerHTML = `<table>
        <tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Actions</th></tr>
        ${sorted.map(e => `<tr>
          <td>${formatDate(e.date)}</td><td>${e.desc}</td><td>${e.category}</td>
          <td>${formatNpr(e.amount)}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-blue btn-sm" onclick="editExpense('${e.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteExpense('${e.id}')">×</button>
          </td>
        </tr>`).join('')}
      </table>`;
    }
    
    function renderCustomers() {
      const db = getDB();
      const customerMap = {};
      db.orders.forEach(o => {
        const key = o.phone || o.name;
        if (!customerMap[key]) {
          customerMap[key] = { name: o.name, phone: o.phone, location: o.location, orders: 0, spent: 0 };
        }
        customerMap[key].orders++;
        customerMap[key].spent += o.amount + (o.shipping || 0);
      });
      const customers = Object.values(customerMap).sort((a, b) => b.spent - a.spent);
      
      if (customers.length === 0) {
        document.getElementById('customersTable').innerHTML = '<div class="empty"><p>Customers appear here when you add orders</p></div>';
        return;
      }
      document.getElementById('customersTable').innerHTML = `<table>
        <tr><th>Name</th><th>Phone</th><th>Location</th><th>Orders</th><th>Total Spent</th></tr>
        ${customers.map(c => `<tr>
          <td>${c.name}</td><td>${c.phone}</td><td>${c.location}</td>
          <td>${c.orders}</td><td>${formatNpr(c.spent)}</td>
        </tr>`).join('')}
      </table>`;
    }
    
    // EXPORT/IMPORT
    function exportData() {
      const db = getDB();
      const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tfsp-records-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.orders && data.inventory && data.expenses) {
            if (confirm('This will replace all current data. Continue?')) {
              saveDB(data);
              render();
              alert('Data imported successfully!');
            }
          } else {
            alert('Invalid file format');
          }
        } catch(err) { alert('Error reading file'); }
      };
      reader.readAsText(file);
    }
    
    // INIT
    render();
    cloudLoad();
  </script>
